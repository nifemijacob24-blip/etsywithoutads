<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internal Content Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 p-4 md:p-8 text-slate-900 flex items-center justify-center min-h-screen">
    <div class="max-w-xl w-full bg-white p-6 rounded-lg shadow-md border border-slate-200">
        <h1 class="text-xl font-bold mb-2">Reddit Post Generator</h1>
        <p class="text-sm text-slate-500 mb-6">Click generate, then copy the Title and Body into Reddit.</p>
        
        <button id="generateBtn" onclick="generatePost()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-md hover:bg-blue-700 transition shadow-sm mb-6">
            Generate Random Reddit Post
        </button>

        <!-- Title Section -->
        <div class="mb-4">
            <div class="flex justify-between items-end mb-1">
                <label class="block text-sm font-bold text-slate-700">Post Title</label>
                <button onclick="copyToClipboard('titleOutput', 'titleBtn')" id="titleBtn" class="text-xs bg-slate-200 hover:bg-slate-300 px-3 py-1 rounded font-semibold transition">Copy Title</button>
            </div>
            <input type="text" id="titleOutput" class="w-full p-3 border border-slate-300 rounded-md bg-slate-50 font-mono text-sm" readonly placeholder="Title will appear here...">
        </div>

        <!-- Body Section -->
        <div>
            <div class="flex justify-between items-end mb-1">
                <label class="block text-sm font-bold text-slate-700">Post Body</label>
                <button onclick="copyToClipboard('bodyOutput', 'bodyBtn')" id="bodyBtn" class="text-xs bg-slate-200 hover:bg-slate-300 px-3 py-1 rounded font-semibold transition">Copy Body</button>
            </div>
            <textarea id="bodyOutput" class="w-full h-48 p-3 border border-slate-300 rounded-md bg-slate-50 font-mono text-sm" readonly placeholder="Body text will appear here..."></textarea>
        </div>
    </div>

    <script>
        async function generatePost() {
            const btn = document.getElementById('generateBtn');
            const titleOutput = document.getElementById('titleOutput');
            const bodyOutput = document.getElementById('bodyOutput');

            btn.innerText = "Generating (Please wait 3-5 seconds)...";
            btn.disabled = true;
            btn.classList.add('opacity-75');

            try {
                const response = await fetch('/.netlify/functions/generate-post', { method: 'POST' });
                const data = await response.json();
                
                if(response.ok) {
                    titleOutput.value = data.title;
                    bodyOutput.value = data.body;
                } else {
                    titleOutput.value = "Error";
                    bodyOutput.value = "Error generating post. Check API key.";
                }
            } catch (err) {
                titleOutput.value = "Error";
                bodyOutput.value = "Network error occurred.";
            } finally {
                btn.innerText = "Generate Random Reddit Post";
                btn.disabled = false;
                btn.classList.remove('opacity-75');
                
                // Reset copy buttons
                document.getElementById('titleBtn').innerText = "Copy Title";
                document.getElementById('bodyBtn').innerText = "Copy Body";
            }
        }

        function copyToClipboard(elementId, btnId) {
            const copyText = document.getElementById(elementId);
            if(!copyText.value) return;
            
            copyText.select();
            copyText.setSelectionRange(0, 99999); // For mobile devices
            navigator.clipboard.writeText(copyText.value);
            
            const btn = document.getElementById(btnId);
            btn.innerText = "Copied!";
            setTimeout(() => { btn.innerText = "Copy " + (elementId === 'titleOutput' ? "Title" : "Body"); }, 2000);
        }
    </script>
</body>
</html>
